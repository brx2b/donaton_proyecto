server:
  port: 8082

spring:
  application:
    name: ms-donaciones

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/

resilience4j:
  circuitbreaker:
    instances:
      usuariosCB:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10000 # Espera 10s antes de reintentar