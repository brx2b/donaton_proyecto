version: '3.8'

services:

  eureka-server:
    build: ./eureka
    ports:
      - "8761:8761"

  ms-usuarios:
    build: ./api-usuarios
    ports:
      - "8081:8081"
    depends_on:
      - eureka-server

  ms-donaciones:
    build: ./api-donaciones
    ports:
      - "8082:8082"
    depends_on:
      - eureka-server
  ms-inventario:
    build: ./api-inventario
    ports:
      - "8083:8083"
    depends_on:
      - eureka-server
  ms-logistica:
    build: ./api-logistica
    ports:
      - "8084:8084"
    depends_on:
      - eureka-server
  ms-necesidades:
    build: ./api-necesidades
    ports:
      - "8085:8085"
    depends_on:
      - eureka-server
  api-gateway:
    build: ./gateway
    ports:
      - "8086:8086"
    depends_on:
      - eureka-server